name: Deploy to EC2 by folder

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "airflow/**"
      - "spark/**"
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      airflow: ${{ steps.filter.outputs.airflow }}
      spark: ${{ steps.filter.outputs.spark }}
      control_tower: ${{ steps.filter.outputs.control_tower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed folders
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            airflow:
              - 'airflow/**'
            spark:
              - 'spark/**'
            control_tower:
              - 'control-tower/**'

  deploy-airflow:
    name: Deploy airflow folder
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.airflow == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target folder exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AIRFLOW_HOST }}
          username: ${{ secrets.AIRFLOW_USER }}
          key: ${{ secrets.AIRFLOW_SSH_KEY }}
          script: mkdir -p "${{ secrets.AIRFLOW_TARGET_PATH }}"

      - name: Upload airflow folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AIRFLOW_HOST }}
          username: ${{ secrets.AIRFLOW_USER }}
          key: ${{ secrets.AIRFLOW_SSH_KEY }}
          source: "airflow/*"
          target: ${{ secrets.AIRFLOW_TARGET_PATH }}
          overwrite: true
          strip_components: 1

  deploy-spark:
    name: Deploy spark folder
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.spark == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target folder exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SPARK_HOST }}
          username: ${{ secrets.SPARK_USER }}
          key: ${{ secrets.SPARK_SSH_KEY }}
          script: mkdir -p "${{ secrets.SPARK_TARGET_PATH }}"

      - name: Upload spark folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SPARK_HOST }}
          username: ${{ secrets.SPARK_USER }}
          key: ${{ secrets.SPARK_SSH_KEY }}
          source: "spark/*"
          target: ${{ secrets.SPARK_TARGET_PATH }}
          overwrite: true
          strip_components: 1

  deploy-control-tower:
    name: Deploy control-tower folder
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.control_tower == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target folder exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_TOWER_HOST }}
          username: ${{ secrets.CONTROL_TOWER_USER }}
          key: ${{ secrets.CONTROL_TOWER_SSH_KEY }}
          script: mkdir -p "${{ secrets.CONTROL_TOWER_TARGET_PATH }}"

      - name: Upload control-tower folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTROL_TOWER_HOST }}
          username: ${{ secrets.CONTROL_TOWER_USER }}
          key: ${{ secrets.CONTROL_TOWER_SSH_KEY }}
          source: "control-tower/*"
          target: ${{ secrets.CONTROL_TOWER_TARGET_PATH }}
          overwrite: true
          strip_components: 1

name: CI - Linter Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  flake8-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Flake8
        run: |
          pip install flake8

      - name: Ejecutar análisis de código (errores bloqueantes)
        run: |
          flake8 . --count --select=F63,F7,F82 --show-source --statistics

      - name: Ejecutar análisis de estilo (no bloqueante)
        run: |
          flake8 . --count --exit-zero --statistics

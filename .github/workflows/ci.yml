name: CI - Lint and Smoke Checks

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main", "dev" ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias de calidad
        run: |
          pip install flake8

      - name: Ejecutar análisis de código (errores bloqueantes)
        run: |
          flake8 . --count --select=F63,F7,F82 --show-source --statistics

      - name: Ejecutar análisis de estilo (no bloqueante)
        run: |
          flake8 . --count --exit-zero --statistics

      - name: Check de sintaxis Python (py_compile)
        run: |
          python -m compileall -q airflow/dags spark/jobs spark/libs scripts ci

      - name: Smoke checks de configuración
        run: |
          python ci/smoke_checks.py

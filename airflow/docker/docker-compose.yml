---
x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  environment:
    &airflow-common-env
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ELECTRICITY_MAPS_TOKEN: ${ELECTRICITY_MAPS_TOKEN}
    AIRFLOW_AWS_CONN_ID: ${AIRFLOW_AWS_CONN_ID:?AIRFLOW_AWS_CONN_ID is required}
    SPARK_SSH_CONN_ID: ${SPARK_SSH_CONN_ID:?SPARK_SSH_CONN_ID is required}
    SPARK_REPO_PATH: ${SPARK_REPO_PATH:?SPARK_REPO_PATH is required}
    AIRFLOW_SCRIPTS_PATH: ${AIRFLOW_SCRIPTS_PATH:?AIRFLOW_SCRIPTS_PATH is required}
    AIRFLOW_DATA_PATH: ${AIRFLOW_DATA_PATH:?AIRFLOW_DATA_PATH is required}
    S3_SOURCES_BUCKET: ${S3_SOURCES_BUCKET:?S3_SOURCES_BUCKET is required}
    S3_BRONZE_BUCKET: ${S3_BRONZE_BUCKET:?S3_BRONZE_BUCKET is required}
    S3_SILVER_BUCKET: ${S3_SILVER_BUCKET:?S3_SILVER_BUCKET is required}
    S3_GOLD_BUCKET: ${S3_GOLD_BUCKET:?S3_GOLD_BUCKET is required}
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:?AIRFLOW__DATABASE__SQL_ALCHEMY_CONN is required}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND:?AIRFLOW__CELERY__RESULT_BACKEND is required}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?AIRFLOW__CORE__FERNET_KEY is required}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Sesión/CSRF: base_url debe coincidir con la URL del navegador; secret_key estable entre workers.
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:?AIRFLOW_BASE_URL is required}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:?AIRFLOW_WEBSERVER_SECRET_KEY is required}
    AIRFLOW__WEBSERVER__COOKIE_SECURE: 'False'
    AIRFLOW__WEBSERVER__SESSION_COOKIE_SAMESITE: 'Lax'
  volumes:
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/scripts:/opt/airflow/scripts
    - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}/data:/opt/airflow/data
  user: "${AIRFLOW_UID:?AIRFLOW_UID is required}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13.16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
    restart: always

  redis:
    image: redis:7.2.5-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/scripts /sources/data /sources/config
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins,scripts,data,config}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:?_AIRFLOW_WWW_USER_USERNAME is required}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:?_AIRFLOW_WWW_USER_PASSWORD is required}
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:?AIRFLOW_PROJ_DIR is required}:/sources

volumes:
  postgres-db-volume: